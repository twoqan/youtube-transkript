<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Özetleyici</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF0000;
    --dark: #0a0a0a;
    --darker: #050505;
    --card: #111111;
    --border: #1f1f1f;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #FF0000;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(255,0,0,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(255,0,0,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }
  .header {
    margin-bottom: 3rem;
    animation: fadeDown 0.8s ease both;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-icon svg {
    width: 18px;
    height: 18px;
    fill: white;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .logo-text span { color: var(--red); }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  h1 em {
    font-style: normal;
    color: var(--red);
    display: block;
  }
  .subtitle {
    margin-top: 1rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.02em;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    animation: fadeUp 0.8s ease 0.2s both;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .input-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .input-row {
    display: flex;
    gap: 0.75rem;
  }
  input[type="text"] {
    flex: 1;
    background: var(--darker);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.875rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,0,0,0.08);
  }
  input[type="text"]::placeholder { color: var(--muted); }
  button {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.875rem 1.5rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  button:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,0,0,0.25);
  }
  button:active { transform: translateY(0); }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .loader {
    display: none;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 1rem;
    font-weight: 300;
  }
  .loader.active { display: flex; }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  .loader-steps {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .loader-step {
    font-size: 0.8rem;
    color: var(--muted);
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.4s, transform 0.4s, color 0.3s;
  }
  .loader-step.active {
    opacity: 1;
    transform: translateX(0);
    color: var(--text);
  }
  .loader-step.done {
    opacity: 0.4;
    color: #4ade80;
  }
  .result {
    display: none;
    margin-top: 1.5rem;
    animation: fadeUp 0.5s ease both;
  }
  .result.active { display: block; }
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--red);
  }
  .result-actions {
    display: flex;
    gap: 0.5rem;
  }
  .btn-small {
    background: var(--border);
    color: var(--muted);
    border: none;
    border-radius: 6px;
    padding: 0.4rem 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0;
  }
  .btn-small:hover {
    background: var(--dark);
    color: var(--text);
    transform: none;
    box-shadow: none;
    opacity: 1;
  }
  .result-content {
    background: var(--darker);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
    max-height: 500px;
    overflow-y: auto;
    font-weight: 300;
  }
  .result-content::-webkit-scrollbar { width: 4px; }
  .result-content::-webkit-scrollbar-track { background: transparent; }
  .result-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .result-content h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: var(--red);
    margin: 1.2rem 0 0.5rem;
    font-weight: 400;
  }
  .result-content h2:first-child { margin-top: 0; }
  .result-content strong { color: white; font-weight: 500; }
  .result-content ul { padding-left: 1.2rem; margin: 0.4rem 0; }
  .result-content li { margin: 0.2rem 0; color: #ccc; }
  .result-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 0.75rem 0;
    font-size: 0.85rem;
  }
  .result-content th {
    background: rgba(255,0,0,0.1);
    color: var(--red);
    font-weight: 500;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    text-align: left;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
  }
  .result-content td {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    color: #ccc;
    vertical-align: top;
  }
  .result-content tr:nth-child(even) td {
    background: rgba(255,255,255,0.02);
  }
  .error-box {
    display: none;
    margin-top: 1rem;
    background: rgba(255,0,0,0.05);
    border: 1px solid rgba(255,0,0,0.2);
    border-radius: 10px;
    padding: 1rem;
    font-size: 0.85rem;
    color: #ff6b6b;
  }
  .error-box.active { display: block; }
  .error-detail {
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid rgba(255,0,0,0.15);
    font-size: 0.75rem;
    color: #aa4444;
    font-family: monospace;
    word-break: break-all;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }
  .video-info {
    display: none;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .video-info.active { display: flex; }
  .video-badge {
    background: rgba(255,0,0,0.1);
    border: 1px solid rgba(255,0,0,0.2);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    color: var(--red);
    font-weight: 500;
    white-space: nowrap;
  }
  .video-url-text {
    font-size: 0.8rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .copy-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
  }
  .copy-toast.show { transform: translateX(-50%) translateY(0); }
  .footer {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 300;
    animation: fadeUp 0.8s ease 0.4s both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M21.8 8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.6 5 12 5 12 5s-4.6 0-7 .1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S2 9.6 2 11.2v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.2.8C6.8 19 12 19 12 19s4.6 0 7-.1c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.5C22 9.6 21.8 8 21.8 8zM10 15V9l5.5 3-5.5 3z"/></svg>
      </div>
      <span class="logo-text">YT<span>ÖZETLEYİCİ</span></span>
    </div>
    <h1>VIDEO<em>ÖZETİ</em></h1>
    <p class="subtitle">YouTube linkini yapıştır, yapay zeka senin için özetlesin</p>
  </div>

  <div class="card">
    <div class="input-group">
      <label class="input-label">YouTube Linki</label>
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
        <button id="submitBtn" onclick="summarize()">ÖZETLE</button>
      </div>
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-steps">
        <div class="loader-step" id="step1">📥 Video alınıyor...</div>
        <div class="loader-step" id="step2">📝 Transkript çekiliyor...</div>
        <div class="loader-step" id="step3">🤖 Yapay zeka analiz ediyor...</div>
        <div class="loader-step" id="step4">✨ Özet hazırlanıyor...</div>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="result" id="result">
      <div class="divider"></div>
      <div class="video-info" id="videoInfo">
        <div class="video-badge">● ÖZET HAZIR</div>
        <div class="video-url-text" id="videoUrlText"></div>
      </div>
      <div class="result-header">
        <div class="result-title">ÖZET</div>
        <div class="result-actions">
          <button class="btn-small" onclick="copyResult()">Kopyala</button>
          <button class="btn-small" onclick="downloadResult()">İndir</button>
          <button class="btn-small" onclick="clearResult()">Temizle</button>
        </div>
      </div>
      <div class="result-content" id="resultContent"></div>
    </div>
  </div>

  <div class="footer">
    n8n + Gemini AI ile güçlendirilmiştir
  </div>
</div>

<div class="copy-toast" id="copyToast">✓ Panoya kopyalandı</div>

<script>
  // =============================================
  // N8N WEBHOOK URL
  const WEBHOOK_URL = 'https://primary-production-d045f.up.railway.app/webhook/ytube';
  // =============================================

  async function summarize() {
    const input = document.getElementById('urlInput');
    const url = input.value.trim();

    if (!url) { showError('Lütfen bir YouTube linki girin.'); return; }
    if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
      showError('Geçerli bir YouTube linki girin.');
      return;
    }

    clearResult();
    hideError();
    startLoading();

    let rawText = '';

    try {
      const controller = new AbortController();
      // 3 dakika timeout — Gemini analizi uzun sürebilir
      const timeoutId = setTimeout(() => controller.abort(), 180000);

      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true'
        },
        body: JSON.stringify({ youtubeUrl: url }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      // Önce ham metni al — boş mu değil mi görelim
      rawText = await response.text();

      if (!response.ok) {
        // n8n hata döndürdü
        let errMsg = `Sunucu hatası: ${response.status} ${response.statusText}`;
        try {
          const errData = JSON.parse(rawText);
          if (errData.message) errMsg += ' — ' + errData.message;
        } catch (_) {}
        showError(errMsg, rawText);
        return;
      }

      if (!rawText || rawText.trim() === '') {
        showError(
          'n8n boş yanıt döndürdü. n8n\'de "Respond to Webhook" node\'unu kontrol et.',
          'Yanıt gövdesi tamamen boş geldi (empty body).'
        );
        return;
      }

      // JSON parse et
      let data;
      try {
        data = JSON.parse(rawText);
      } catch (parseErr) {
        showError(
          'Sunucudan geçersiz yanıt geldi (JSON değil).',
          'Ham yanıt: ' + rawText.substring(0, 300)
        );
        return;
      }

      stopLoading();

      // n8n bazen array içinde döndürür: [{summary: ...}]
      const item = Array.isArray(data) ? data[0] : data;
      const summary = item.summary || item.text || item.output || JSON.stringify(item, null, 2);

      showResult(summary, url);

    } catch (err) {
      stopLoading();
      if (err.name === 'AbortError') {
        showError(
          'İstek zaman aşımına uğradı (3 dakika). Gemini analizi çok uzun sürdü.',
          'Öneri: n8n workflow\'unda zaman aşımı ayarlarını kontrol et.'
        );
      } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        showError(
          'n8n sunucusuna bağlanılamadı.',
          'Kontrol et: 1) ngrok çalışıyor mu? 2) n8n aktif mi? 3) Webhook URL doğru mu?\n\nURL: ' + WEBHOOK_URL
        );
      } else {
        showError('Beklenmedik hata: ' + err.message, rawText ? 'Ham yanıt: ' + rawText.substring(0, 300) : '');
      }
    }
  }

  function startLoading() {
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loader').classList.add('active');
    const steps = ['step1', 'step2', 'step3', 'step4'];
    const delays = [0, 2000, 5000, 12000];
    steps.forEach((id, idx) => {
      setTimeout(() => {
        if (idx > 0) {
          document.getElementById(steps[idx - 1]).classList.remove('active');
          document.getElementById(steps[idx - 1]).classList.add('done');
        }
        document.getElementById(id).classList.add('active');
      }, delays[idx]);
    });
  }

  function stopLoading() {
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('loader').classList.remove('active');
    ['step1','step2','step3','step4'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('active', 'done');
    });
  }

  function showResult(summary, url) {
    currentSummaryText = summary;
    document.getElementById('resultContent').innerHTML = formatMarkdown(summary);
    document.getElementById('videoUrlText').textContent = url;
    document.getElementById('videoInfo').classList.add('active');
    document.getElementById('result').classList.add('active');
  }

  function formatMarkdown(text) {
    const lines = text.split('\n');
    let html = '';
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      // Tablo satırı mı?
      if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
        const tableLines = [];
        while (i < lines.length && lines[i].trim().startsWith('|')) {
          tableLines.push(lines[i]);
          i++;
        }
        html += parseTable(tableLines);
        continue;
      }
      // H2 başlık
      if (line.startsWith('## ')) {
        html += `<h2>${applyInline(line.slice(3))}</h2>`;
      }
      // Madde işareti
      else if (line.match(/^[\*\-] /)) {
        html += `<ul><li>${applyInline(line.slice(2))}</li></ul>`;
      }
      // Boş satır
      else if (line.trim() === '') {
        html += '<br>';
      }
      // Normal metin
      else {
        html += `<p style="margin:0.2rem 0">${applyInline(line)}</p>`;
      }
      i++;
    }
    // Yan yana ul'leri birleştir
    html = html.replace(/<\/ul><ul>/g, '');
    return html;
  }

  function applyInline(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  function parseTable(lines) {
    if (lines.length < 2) return lines.join('<br>');
    let html = '<table>';
    lines.forEach((line, idx) => {
      // Ayırıcı satır (|---|---|) ise atla
      if (line.replace(/[\|\-\:\s]/g, '') === '') return;
      const cells = line.split('|').filter((_, ci) => ci > 0 && ci < line.split('|').length - 1);
      if (idx === 0) {
        html += '<thead><tr>' + cells.map(c => `<th>${applyInline(c.trim())}</th>`).join('') + '</tr></thead><tbody>';
      } else {
        html += '<tr>' + cells.map(c => `<td>${applyInline(c.trim())}</td>`).join('') + '</tr>';
      }
    });
    html += '</tbody></table>';
    return html;
  }

  let currentSummaryText = '';

  function downloadResult() {
    if (!currentSummaryText) return;
    const blob = new Blob([currentSummaryText], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'youtube-ozet.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  function clearResult() {
    currentSummaryText = '';
    document.getElementById('result').classList.remove('active');
    document.getElementById('videoInfo').classList.remove('active');
    document.getElementById('resultContent').innerHTML = '';
  }

  function showError(msg, detail) {
    const box = document.getElementById('errorBox');
    let html = msg;
    if (detail) {
      html += `<div class="error-detail">${detail}</div>`;
    }
    box.innerHTML = html;
    box.classList.add('active');
  }

  function hideError() {
    document.getElementById('errorBox').classList.remove('active');
  }

  function copyResult() {
    const text = document.getElementById('resultContent').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('copyToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    });
  }

  document.getElementById('urlInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') summarize();
  });
</script>
</body>
</html>
